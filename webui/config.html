<html>
<head>
  <title>Vision Fallback Settings</title>
  <script type="module">
    import { callJsonApi } from "/js/api.js";
  </script>
</head>
<body>
  <div x-data="{
      configuredProviders: {},
      showCustomKey: false,
      async loadKeys() {
        try {
          const data = await callJsonApi('plugins/a0_vision_fallback/available_providers', {});
          this.configuredProviders = data.configured || {};
        } catch(e) {
          this.configuredProviders = {};
        }
      },
      hasKey(provider) {
        return !!this.configuredProviders[provider];
      }
    }" x-init="
      await this.loadKeys();
      if (!config.vision_model) config.vision_model = {};
      if (!config.vision_model.provider) config.vision_model.provider = 'ollama_cloud';
      if (!config.vision_model.name) config.vision_model.name = 'gemini-3-flash-preview';
      if (!config.vision_model.api_key) config.vision_model.api_key = '';
      if (!config.vision_model.api_base) config.vision_model.api_base = '';
      if (!config.prompt) config.prompt = 'Describe this image in detail.';
      if (config.enabled === undefined) config.enabled = true;
    ">

    <div class="vf-section">⚡ Vision Fallback</div>

    <div class="vf-field">
      <label class="vf-toggle">
        <input type="checkbox" x-model="config.enabled" />
        <span><strong>Enable Vision Fallback</strong></span>
      </label>
      <div class="vf-help">When enabled, images are intercepted and sent to a dedicated vision model instead of the main chat model.</div>
    </div>

    <div class="vf-section">Vision Model</div>

    <div class="vf-field">
      <label class="vf-label">Provider</label>
      <select class="vf-input" x-model="config.vision_model.provider">
        <option value="ollama_cloud" x-text="hasKey('ollama_cloud') ? 'Ollama Cloud ✅' : 'Ollama Cloud'"></option>
        <option value="openrouter" x-text="hasKey('openrouter') ? 'OpenRouter ✅' : 'OpenRouter'"></option>
        <option value="ollama" x-text="hasKey('ollama') ? 'Ollama (Local) ✅' : 'Ollama (Local)'"></option>
        <option value="openai" x-text="hasKey('openai') ? 'OpenAI ✅' : 'OpenAI'"></option>
        <option value="anthropic" x-text="hasKey('anthropic') ? 'Anthropic ✅' : 'Anthropic'"></option>
        <option value="google" x-text="hasKey('google') ? 'Google AI ✅' : 'Google AI'"></option>
        <option value="groq" x-text="hasKey('groq') ? 'Groq ✅' : 'Groq'"></option>
        <option value="other">Other (Custom)</option>
      </select>
      <div class="vf-help" x-show="hasKey(config.vision_model.provider)" style="color: #27ae60;">
        ✅ Key detected — no need to enter one below.
      </div>
    </div>

    <div class="vf-field">
      <label class="vf-label">Model Name</label>
      <input type="text" class="vf-input" x-model="config.vision_model.name" placeholder="gemini-3-flash-preview" />
      <div class="vf-help">Vision models: <code>gemini-3-flash-preview</code>, <code>llama3.2-vision</code>, <code>gpt-4o-mini</code></div>
    </div>

    <div class="vf-field">
      <label class="vf-label">API Key</label>
      <label class="vf-toggle vf-key-toggle">
        <input type="checkbox" x-model="showCustomKey" />
        <span>Enter a custom key</span>
      </label>
      <template x-if="showCustomKey">
        <input type="password" class="vf-input" x-model="config.vision_model.api_key" placeholder="sk-..." />
      </template>
      <template x-if="!showCustomKey && !hasKey(config.vision_model.provider)">
        <div class="vf-help" style="color: #e67e22;">⚠️ No key detected for this provider. Enable "Enter a custom key" to add one.</div>
      </template>
    </div>

    <template x-if="config.vision_model.provider === 'other'">
      <div class="vf-field">
        <label class="vf-label">API Base URL</label>
        <input type="text" class="vf-input" x-model="config.vision_model.api_base" placeholder="https://custom-endpoint.com" />
      </div>
    </template>

  </div>

  <style>
    .vf-field { margin-bottom: 16px; }
    .vf-label { display: block; font-weight: 600; margin-bottom: 4px; color: var(--color-text-primary, inherit); }
    .vf-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--color-border, #444);
      border-radius: 6px;
      background: var(--color-bg-input, inherit);
      color: var(--color-text-primary, inherit);
      box-sizing: border-box;
    }
    .vf-input:focus { outline: none; border-color: var(--color-accent, #3b82f6); }
    .vf-help { font-size: 0.85em; color: var(--color-text-secondary, #888); margin-top: 4px; }
    .vf-help code {
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--color-bg-code, rgba(128,128,128,0.15));
      font-size: 0.9em;
    }
    .vf-toggle { display: flex; align-items: center; gap: 8px; }
    .vf-section {
      font-size: 1.1em;
      font-weight: 700;
      margin: 20px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--color-border, #333);
    }
    .vf-key-toggle {
      font-size: 0.9em;
      color: var(--color-text-secondary, #888);
      cursor: pointer;
    }
  </style>
</body>
</html>
